version: "3.9"

services:
  web:
    build: ./app
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - appnet
    labels:
      - "tier=frontend"

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
    volumes:
      - db-data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d mydb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - appnet
    labels:
      - "tier=database"

  cache:
    image: redis:7-alpine
    networks:
      - appnet
    labels:
      - "tier=cache"

networks:
  appnet:
    driver: bridge

volumes:
  db-data:
